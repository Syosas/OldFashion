<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OldFineCraft | Efsanevi Macera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0e0e11] text-[#ededed] font-sans antialiased min-h-screen flex flex-col">

    <div class="fixed inset-0 z-[-1] bg-[url('images/background.png')] bg-cover bg-center bg-fixed">
        <div class="absolute inset-0 bg-black/65 backdrop-blur-[2px]"></div>
    </div>

    <nav class="border-b border-white/10 bg-black/40 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="images/logo.png" alt="Logo" class="w-12 h-12 object-contain">
                <span class="font-black text-xl tracking-tighter uppercase">OldFineCraft</span>
            </div>
            <div class="hidden md:flex items-center gap-8 text-sm font-bold uppercase tracking-widest text-white/60">
                <button class="nav-btn hover:text-white transition-all active" data-target="home">Ana Sayfa</button>
                <button class="nav-btn hover:text-white transition-all" data-target="store">Mağaza</button>
                <button class="nav-btn hover:text-white transition-all" data-target="info">Kurallar</button>
            </div>
            <div class="flex items-center gap-4">
                <button class="px-5 py-2.5 bg-amber-600 hover:bg-amber-500 text-white text-sm font-black rounded-lg transition-all shadow-lg shadow-amber-900/20">KAYIT OL</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center text-center px-6 py-24">
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-green-500/10 border border-green-500/20 text-green-400 text-xs font-bold mb-8">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
            Sunucu Aktif - 142 Oyuncu Çevrimiçi
        </div>
        <h1 class="text-6xl md:text-8xl font-black tracking-tighter mb-6 bg-gradient-to-b from-white to-white/40 bg-clip-text text-transparent leading-none">
            ESKİLERİN TARZINDA<br>YENİ BİR MACERA
        </h1>
        <p class="text-lg text-white/50 max-w-2xl mb-12">
            OldFineCraft, klasik Minecraft hayatta kalma deneyimini modern altyapı ile birleştiriyor.
        </p>
        <div class="flex flex-wrap justify-center gap-4">
            <button id="copy-ip-btn" class="px-8 py-4 bg-white text-black font-black rounded-xl hover:scale-105 transition-transform flex items-center gap-3">
                <i data-lucide="copy" class="w-5 h-5"></i> oyna.oldfinecraft.online
            </button>
            <button class="px-8 py-4 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition-all font-bold">Mağazayı İncele</button>
        </div>
    </main>

    <script src="app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
